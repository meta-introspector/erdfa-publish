name: Build CLI + Service (all platforms)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@main
      - uses: meta-introspector/install-nix-action@master
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Check
        run: nix develop --command cargo check
      - name: Test
        run: nix develop --command cargo test
      - name: Build
        run: nix develop --command cargo build --release --bin solfunmeme_cli --bin solfunmeme-service
      - uses: meta-introspector/upload-artifact@main
        with:
          name: linux-x86_64
          path: |
            target/release/solfunmeme_cli
            target/release/solfunmeme-service

  macos-arm:
    name: macOS aarch64
    runs-on: macos-latest
    steps:
      - uses: meta-introspector/checkout@main
      - uses: meta-introspector/install-nix-action@master
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Build
        run: nix develop --command cargo build --release --bin solfunmeme_cli --bin solfunmeme-service
      - uses: meta-introspector/upload-artifact@main
        with:
          name: macos-aarch64
          path: |
            target/release/solfunmeme_cli
            target/release/solfunmeme-service

  macos-x86:
    name: macOS x86_64
    runs-on: macos-13
    steps:
      - uses: meta-introspector/checkout@main
      - uses: meta-introspector/install-nix-action@master
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Build
        run: nix develop --command cargo build --release --bin solfunmeme_cli --bin solfunmeme-service
      - uses: meta-introspector/upload-artifact@main
        with:
          name: macos-x86_64
          path: |
            target/release/solfunmeme_cli
            target/release/solfunmeme-service

  wasm-lib:
    name: WASM lib check
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@main
      - uses: meta-introspector/install-nix-action@master
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Check WASM
        run: nix develop --command cargo check --lib --no-default-features --features wasm
